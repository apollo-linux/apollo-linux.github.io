<div class="container download-container">
    <h2>{{title}}</h2>
    <p class="info"><em>Image name: <code>{{image_name}}</code></em></p>
    <p class="info"><em>SHA256 sum: <code>{{sha256_sum}}</code></em></p>
    <p class="description">{{description}}</p>

    <div class="button-container">
        <a class="button suggestive" href="{{ image_link }}">Download {{image_name}}</a>
    </div>
</div>
